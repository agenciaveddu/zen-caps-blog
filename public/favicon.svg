<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Capsule rotated 30 degrees -->
  <g transform="translate(64,64) rotate(-30)">
    <!-- Top half (darker blue) -->
    <rect x="-20" y="-44" width="40" height="44" rx="20" fill="url(#cap)"/>
    <!-- Bottom half (lighter blue) -->
    <rect x="-20" y="0" width="40" height="44" rx="20" fill="url(#body)"/>
    <!-- Cover the rounded corners at the seam -->
    <rect x="-20" y="-6" width="40" height="12" fill="url(#cap)"/>
    <!-- Seam line -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <!-- Shine highlight -->
    <rect x="-12" y="-38" width="6" height="20" rx="3" fill="#fff" opacity="0.35"/>
  </g>
</svg>
